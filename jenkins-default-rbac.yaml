apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins
  namespace: jenkins

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default  # Namespace cho ứng dụng
  name: jenkins-helm-manager
rules:
- apiGroups: [""]
  resources:
  - secrets
  - configmaps
  - services
  - serviceaccounts
  - persistentvolumeclaims
  - pods
  - pods/log
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources:
  - deployments
  - statefulsets
  - daemonsets
  - replicasets
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources:
  - jobs
  - cronjobs
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["networking.k8s.io"]
  resources:
  - ingresses
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-helm-manager-binding
  namespace: default  # Namespace cho ứng dụng
subjects:
- kind: ServiceAccount
  name: jenkins
  namespace: jenkins  # Namespace cho Jenkins
roleRef:
  kind: Role
  name: jenkins-helm-manager
  apiGroup: rbac.authorization.k8s.io

---
# ClusterRole mở rộng cho Helm và kubectl
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: jenkins-helm-cluster-role
rules:
- apiGroups: [""]
  resources: ["namespaces", "nodes", "secrets", "pods"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles"]
  verbs: ["get", "list"]
- apiGroups: ["storage.k8s.io"]
  resources: ["storageclasses"]
  verbs: ["get", "list"]
- apiGroups: ["extensions", "apps"]
  resources: ["deployments"]
  verbs: ["get", "list", "watch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: jenkins-helm-cluster-binding
subjects:
- kind: ServiceAccount
  name: jenkins
  namespace: jenkins  # Namespace cho Jenkins
roleRef:
  kind: ClusterRole
  name: jenkins-helm-cluster-role
  apiGroup: rbac.authorization.k8s.io