# jenkins-default-rbac.yaml
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: default
  name: secret-reader
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get","list","watch","create","update","patch","delete"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-secret-reader
  namespace: default
subjects:
- kind: ServiceAccount
  name: jenkins
  namespace: jenkins  # Replace with your actual Jenkins namespace if different
roleRef:
  kind: Role
  name: secret-reader
  apiGroup: rbac.authorization.k8s.io